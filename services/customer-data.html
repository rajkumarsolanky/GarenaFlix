<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Transactions</title>
    <link rel="stylesheet" href="../css/customer-data-styles.css">
    
    <script src="../js/database.js"></script>
    <script src="../js/payment-handle.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Customer Transactions</h1>
            <div class="export-buttons">
                <button onclick="exportData('csv')" class="export-button">Export CSV</button>
                <button onclick="exportData('json')" class="export-button">Export JSON</button>
                <button onclick="window.print()" class="export-button">Print</button>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by email, phone, transaction ID...">
            <select id="statusFilter">
                <option value="all">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
            </select>
            <button onclick="searchTransactions()">Search</button>
        </div>

        <table class="transactions-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Transaction ID</th>
                    <th>Customer</th>
                    <th>Service</th>
                    <th>Plan</th>
                    <th>Amount</th>
                    <th>Subscription</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="transactionsBody">
                <!-- Transactions will be loaded here -->
            </tbody>
        </table>

        <div id="detailsModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="modalContent"></div>
            </div>
        </div>

        <div id="deleteModal" class="modal">
            <div class="modal-content delete-confirm">
                <h2>Confirm Deletion</h2>
                <p>Are you sure you want to delete this transaction?</p>
                <p class="warning">This action cannot be undone!</p>
                <div class="transaction-preview"></div>
                <div class="button-group">
                    <button onclick="closeDeleteModal()" class="cancel-btn">Cancel</button>
                    <button onclick="executeDelete()" class="delete-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load and display transactions
        function loadTransactions() {
            const transactions = DatabaseHandler.getAllTransactions();
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '';

            transactions.forEach(t => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${new Date(t.date).toLocaleString()}</td>
                    <td>${t.transactionId}</td>
                    <td>${t.customerEmail || 'N/A'}</td>
                    <td>${t.service.toUpperCase()}</td>
                    <td>${t.planName}</td>
                    <td>${t.amount}</td>
                    <td>${new Date(t.date).toLocaleDateString()} - ${new Date(t.subscriptionEnd || '').toLocaleDateString()}</td>
                    <td><span class="status-${t.status.toLowerCase()}">${t.status}</span></td>
                    <td> 
                        <div class="actions">
                            <button onclick="viewDetails('${t.transactionId}')" class="action-btn">View</button>
                            <button onclick="downloadReceipt('${t.transactionId}')" class="action-btn">Receipt</button>
                            <button onclick="confirmDelete('${t.transactionId}')" class="action-btn delete">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        let currentTransactionId = null;

        function confirmDelete(transactionId) {
            const transaction = JSON.parse(localStorage.getItem(`transaction_${transactionId}`));
            if (!transaction) return;

            currentTransactionId = transactionId;
            
            const preview = document.querySelector('.transaction-preview');
            preview.innerHTML = `
                <p><strong>Transaction ID:</strong> ${transaction.transactionId}</p>
                <p><strong>Service:</strong> ${transaction.service?.toUpperCase()}</p>
                <p><strong>Plan:</strong> ${transaction.planName}</p>
                <p><strong>Amount:</strong> ${transaction.amount}</p>
                <p><strong>Date:</strong> ${new Date(transaction.date).toLocaleString()}</p>
            `;

            document.getElementById('deleteModal').style.display = 'block';
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            currentTransactionId = null;
        }

        function executeDelete() {
            if (!currentTransactionId) return;

            if (DatabaseHandler.deleteTransaction(currentTransactionId)) {
                showNotification('Transaction deleted successfully', 'success');
                closeDeleteModal();
                loadTransactions();
            } else {
                showNotification('Failed to delete transaction', 'error');
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('deleteModal');
            if (event.target === modal) {
                closeDeleteModal();
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function searchTransactions() {
            const query = document.getElementById('searchInput').value;
            const status = document.getElementById('statusFilter').value;
            const transactions = DatabaseHandler.searchTransactions(query, status);
            
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '';
            
            transactions.forEach(t => {
            });
        }

        function exportData(format) {
            const data = DatabaseHandler.exportTransactions(format);
            const blob = new Blob([data], { type: format === 'csv' ? 'text/csv' : 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `transactions.${format}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function viewDetails(transactionId) {
            const transaction = JSON.parse(localStorage.getItem(`transaction_${transactionId}`));
            if (!transaction) return;

            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <h2>Transaction Details</h2>
                <div class="transaction-details">
                    <p><strong>ID:</strong> ${transaction.transactionId}</p>
                    <p><strong>Date:</strong> ${new Date(transaction.date).toLocaleString()}</p>
                    <p><strong>Service:</strong> ${transaction.service.toUpperCase()}</p>
                    <p><strong>Plan:</strong> ${transaction.planName}</p>
                    <p><strong>Amount:</strong> ${transaction.amount}</p>
                    <p><strong>Payment Method:</strong> ${transaction.paymentMethod}</p>
                    <p><strong>Status:</strong> ${transaction.status}</p>
                    <p><strong>Reference:</strong> ${transaction.transferRef || 'N/A'}</p>
                </div>
            `;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', loadTransactions);

        document.getElementById('searchInput').addEventListener('input', searchTransactions);
        document.getElementById('statusFilter').addEventListener('change', searchTransactions);
    </script>
</body>
</html>
